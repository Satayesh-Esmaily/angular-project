<app-page-header
  title="Dashboard"
  subtitle="Overview of your project tasks and completion progress"
/>

<section class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
  <article class="rounded-2xl border border-slate-200 bg-white p-4">
    <p class="text-sm text-slate-500">Total Tasks</p>
    <p class="mt-2 text-3xl font-semibold text-slate-900">{{ totalTasks() }}</p>
  </article>
  <article class="rounded-2xl border border-slate-200 bg-white p-4">
    <p class="text-sm text-slate-500">Completed</p>
    <p class="mt-2 text-3xl font-semibold text-emerald-600">{{ completedTasks() }}</p>
  </article>
  <article class="rounded-2xl border border-slate-200 bg-white p-4">
    <p class="text-sm text-slate-500">Open</p>
    <p class="mt-2 text-3xl font-semibold text-amber-600">{{ openTasks() }}</p>
  </article>
  <article class="rounded-2xl border border-slate-200 bg-white p-4">
    <p class="text-sm text-slate-500">Completion</p>
    <p class="mt-2 text-3xl font-semibold text-sky-600">{{ completionRate() }}%</p>
  </article>
</section>

<section class="mt-8 rounded-2xl border border-slate-200 bg-white p-4">
  <h2 class="text-lg font-semibold text-slate-900">Recent Tasks</h2>
  <ul class="mt-4 space-y-3">
    @for (task of recentTasks(); track task.id) {
      <li class="flex items-start justify-between rounded-xl border border-slate-100 p-3">
        <div>
          <p class="font-medium text-slate-900">{{ task.title }}</p>
          <p class="text-sm text-slate-500">{{ task.description }}</p>
        </div>
        <span class="rounded-full bg-slate-100 px-2 py-1 text-xs text-slate-600">{{ task.priority }}</span>
      </li>
    }
  </ul>
</section>
