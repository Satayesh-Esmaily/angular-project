<form class="rounded-2xl border border-slate-200 bg-white p-4" (ngSubmit)="onSubmit()">
  <h2 class="text-lg font-semibold text-slate-900">Create Task</h2>

  <div class="mt-4 grid gap-4">
    <label class="grid gap-1 text-sm text-slate-600">
      Title
      <input [(ngModel)]="title" name="title" class="rounded-lg border border-slate-300 px-3 py-2" placeholder="Task title" />
    </label>

    <label class="grid gap-1 text-sm text-slate-600">
      Description
      <textarea [(ngModel)]="description" name="description" rows="3" class="rounded-lg border border-slate-300 px-3 py-2" placeholder="Task description"></textarea>
    </label>

    <label class="grid gap-1 text-sm text-slate-600">
      Priority
      <select [(ngModel)]="priority" name="priority" class="rounded-lg border border-slate-300 px-3 py-2">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </label>
  </div>

  <button type="submit" class="mt-4 rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white">Add Task</button>
</form>
